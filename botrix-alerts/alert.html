<div id="botrix-alert-container" class="alert-hidden">
  <!-- Hidden elements for safe variable extraction (avoids JS syntax errors with quotes) -->
  <div id="meta-data" style="display: none;">
    <span id="meta-name">{name}</span>
    <span id="meta-text">{text}</span>
    <span id="meta-amount">{amount}</span>
    <span id="meta-message">{message}</span>
    <span id="meta-image">{image}</span>
    <span id="meta-sound">{sound}</span>
  </div>

  <div class="f1-alert-banner">
    <!-- Left badge / Image section -->
    <div class="f1-alert-badge">
      <div class="f1-image-wrapper">
        <!-- Renders {image} if available, otherwise falls back to the checkered flag SVG -->
        <img id="alert-img" src="{image}" alt="Alert Image" onerror="this.style.display='none';" />
        <div id="alert-fallback-icon" class="fallback-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 21V3H12L12.4 5H20V16H14L13.6 14H7V21H5Z" fill="currentColor"/>
          </svg>
        </div>
      </div>
      <div class="badge-stripe"></div>
    </div>

    <!-- Right body / Information section -->
    <div class="f1-alert-body">
      <div class="f1-alert-header">
        <span id="alert-category" class="category-text">RACE CONTROL</span>
        <span class="header-indicator"></span>
      </div>
      <div class="f1-alert-content">
        <h1 id="alert-main-title" class="alert-title">¡NUEVO PILOTO!</h1>
        <p id="alert-subtitle" class="alert-desc">Se sumó a la grilla de boxes</p>
        <p id="alert-user-message" class="alert-msg" style="display: none;"></p>
      </div>
    </div>
  </div>
</div>
